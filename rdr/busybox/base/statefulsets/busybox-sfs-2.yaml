apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    appname: busybox_app_sfs_2
    workloadpattern: simple_io
  name: busybox-sfs-2
spec:
  serviceName: busybox-sfs-2
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      workload: busybox-sfs-2
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        workload: busybox-sfs-2
        appgroup: busybox-group
    spec:
      terminationGracePeriodSeconds: 30
      tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 180
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 180
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: appgroup
                  operator: In
                  values:
                  - busybox-group
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            appgroup: busybox-group
      initContainers:
      - name: init-integrity-check
        image: quay.io/ocsci/rdr-ocs-workload:latest
        env:
        - name: CONTAINER_VALUE
          value: "init"
        command: ['sh', '-c']
        args:
        - /mnt/simple_io_integrity_check.sh
        volumeMounts:
        - mountPath: /mnt/test
          name: data
      containers:
      - command: ["/bin/sh", "-c"]
        args:
          - cp /mnt/simple_io.sh /mnt/test/simple_io.sh ; cp /mnt/simple_io_integrity_check.sh /mnt/test/simple_io_integrity_check.sh;
            chmod +x /mnt/test/simple_io.sh; chmod +x /mnt/test/simple_io_integrity_check.sh;
            /mnt/test/simple_io.sh
        image: quay.io/ocsci/rdr-ocs-workload:latest
        env:
        - name: IO_SCRIPT
          value: "/mnt/test/simple_io.sh"
        - name: DATA_INTEGRITY_SCRIPT
          value: "/mnt/test/simple_io_integrity_check.sh"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        imagePullPolicy: IfNotPresent
        name: busybox
        volumeMounts:
        - mountPath: /mnt/test
          name: data
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        appname: busybox_app_sfs_2
        workloadpattern: simple_io_pvc
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 94Gi
      storageClassName: ocs-storagecluster-ceph-rbd
