---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-1
spec:
  template:
    spec:
      serviceAccountName: busybox-scc-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: busybox
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
