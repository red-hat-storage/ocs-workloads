---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-1
spec:
  template:
    spec:
      serviceAccountName: busybox-scc-sa
      containers:
      - name: busybox
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
