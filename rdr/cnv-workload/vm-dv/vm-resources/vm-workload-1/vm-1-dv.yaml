---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  labels:
    appname: vm
  name: root-disk-vm-dv
spec:
  source:
    registry:
      url: docker://quay.io/ocsci/cirros-dd:release-4.21
  storage:
    accessModes:
    - ReadWriteMany
    resources:
      requests:
        storage: 20Gi
    storageClassName: ocs-storagecluster-ceph-rbd-virtualization