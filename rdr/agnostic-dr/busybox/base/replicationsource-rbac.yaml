apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: replicationsource-reader
rules:
- apiGroups: ["volsync.backube"]
  resources: ["replicationsources"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: busybox-replicationsource-reader
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: replicationsource-reader
  apiGroup: rbac.authorization.k8s.io
